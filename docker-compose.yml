version: '3'
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: vietsmart_password
      POSTGRES_DB: dify
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data

  redis:
    image: redis:6-alpine
    restart: always
    volumes:
      - ./volumes/redis/data:/data

  api:
    image: langgenius/dify-api:latest
    restart: always
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: vietsmart_password
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  web:
    image: langgenius/dify-web:latest
    restart: always
    ports:
      - "80:3000"
    depends_on:
      - api
